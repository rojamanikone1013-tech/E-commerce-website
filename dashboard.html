<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-4xl mx-auto mt-10">

    <h1 class="text-4xl font-bold text-center mb-8">
        Welcome to Dashboard
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">

        <a href="products.html"
           class="bg-blue-500 text-white p-6 rounded-lg text-center">
            Products
        </a>

        <a href="wishlist.html"
           class="bg-red-500 text-white p-6 rounded-lg text-center">
            Wishlist
        </a>

        <a href="cart.html"
           class="bg-green-500 text-white p-6 rounded-lg text-center">
            Cart
        </a>

        <a href="profile.html"
           class="bg-purple-500 text-white p-6 rounded-lg text-center">
            Profile
        </a>

        <button onclick="logout()"
           class="bg-black text-white p-6 rounded-lg">
            Logout
        </button>

    </div>

</div>

<script>
if(localStorage.getItem("isLoggedIn") !== "true"){
    window.location.href = "products.html";
}

function logout(){
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("userEmail");
    window.location.href = "products.html";
}
</script>

</body>
</html>
