<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .cart-item{
    display:flex;
    align-items:center;
    gap:20px;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

        .cart-item img{
            width:100px;
            height:100px;
            object-fit:cover;
            border-radius:10px;
        }
    </style>
</head>
<body>
    <div class="max-w-3xl mx-auto">

    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-bold mt-5">My Wishlist</h1>

        <a href="products.html"
           class="bg-black text-white px-4 py-2 rounded mt-5">
            Back To Store
        </a>
    </div>

    <div id="wishlistItems"></div>

</div>

<script>

let wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

let container =
document.getElementById("wishlistItems");

wishlist.forEach(item => {

    container.innerHTML += `
        <div class="cart-item">
            <img src="${item.image || item.thumbnail}">
            <div>
                <h3>${item.name || item.title}</h3>
                <p>₹${item.price}</p>
            </div>
        </div>
    `;
});

</script>
</body>
</html>
